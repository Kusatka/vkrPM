<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Вотчер{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --paper:#e7dcc1; --paper-2:#ddd0af; --paper-3:#cdbb95;
      --ink:#221a10; --ink-soft:#5d4c34;
      --sienna:#a8551f; --oxblood:#7c2d22; --olive:#5b6e2c;
      --lo:#f4ead2; --hi:#c3b288;
      --dither:radial-gradient(var(--ink) 0.5px, transparent 0.6px);
    }
    *{box-sizing:border-box}
    ::selection{background:var(--sienna);color:var(--paper)}
    body{background:var(--paper);color:var(--ink);font-family:"Space Mono",monospace;line-height:1.6}
    main.container{max-width:1040px;padding-top:1.5rem;padding-bottom:3rem}
    h1,h2,h3,h4,.brand{font-family:"Big Shoulders Display",sans-serif;font-weight:800;letter-spacing:.01em;text-transform:uppercase;color:var(--ink)}
    a{color:var(--sienna);text-decoration:none}
    a:hover{color:var(--oxblood);text-decoration:underline;text-underline-offset:3px}
    .muted{color:var(--ink-soft)}
    .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft)}
    .site-nav{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;padding:.6rem 1.1rem;background:var(--paper-2);border-bottom:3px solid var(--ink)}
    .brand{font-size:1.7rem;letter-spacing:.02em}
    .brand span{color:var(--sienna)}
    .nav-links{display:flex;gap:.9rem}
    .nav-links a,.nav-auth a{color:var(--ink);text-transform:uppercase;font-size:.82rem;letter-spacing:.06em}
    .nav-links a:hover,.nav-auth a:hover{color:var(--sienna);text-decoration:none}
    .nav-search{margin-left:auto}
    .nav-search input{width:200px}
    .nav-auth{display:flex;align-items:center;gap:.8rem}
    .nav-user{font-size:.8rem;color:var(--ink-soft)}
    .neu-btn,.btn,button[type=submit]{font-family:"Space Mono",monospace!important;text-transform:uppercase;letter-spacing:.05em;font-size:.8rem!important;color:var(--ink)!important;background:var(--paper)!important;border:none!important;border-radius:5px!important;padding:.5rem .9rem!important;box-shadow:4px 4px 8px var(--hi),-4px -4px 8px var(--lo)!important;transition:all .08s}
    .neu-btn:hover,.btn:hover{color:var(--sienna)!important}
    .neu-btn:active,.btn:active{box-shadow:inset 3px 3px 6px var(--hi),inset -3px -3px 6px var(--lo)!important;transform:translateY(1px)}
    .neu-btn.sm,.btn-sm{padding:.32rem .6rem!important;font-size:.72rem!important}
    .btn-primary,.btn-outline-primary{color:var(--sienna)!important;font-weight:700}
    .btn-outline-danger{color:var(--oxblood)!important}
    input,select,textarea,.form-control,.form-select{font-family:"Space Mono",monospace!important;color:var(--ink)!important;background:var(--paper-2)!important;border:none!important;border-radius:4px!important;padding:.45rem .65rem!important;box-shadow:inset 3px 3px 6px var(--hi),inset -3px -3px 6px var(--lo)!important}
    input:focus,select:focus,textarea:focus,.form-control:focus,.form-select:focus{outline:2px solid var(--sienna)!important}
    label{font-size:.72rem!important;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft)!important;font-weight:700}
    .card,.brut{background:var(--paper-2)!important;border:2px solid var(--ink)!important;border-radius:0!important;box-shadow:5px 5px 0 var(--ink)!important}
    .card-body{padding:1.1rem 1.2rem}
    .film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.25rem;margin-top:1.25rem}
    .film-card{background:var(--paper-2);border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink);display:flex;flex-direction:column;transition:transform .08s}
    .film-card:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--ink)}
    .poster{position:relative;aspect-ratio:3/4;background-color:var(--paper-3);display:flex;align-items:flex-end;border-bottom:2px solid var(--ink)}
    .poster .filmstrip{position:absolute;top:0;left:0;right:0;height:9px;background:repeating-linear-gradient(90deg,var(--ink) 0 5px,transparent 5px 11px)}
    .poster .ptitle{font-family:"Big Shoulders Display",sans-serif;font-weight:800;text-transform:uppercase;font-size:1.5rem;line-height:.95;color:var(--paper);padding:.6rem;text-shadow:1px 1px 0 rgba(34,26,16,.55)}
    .poster .pyear{position:absolute;top:14px;right:8px;font-size:.72rem;background:var(--ink);color:var(--paper);padding:1px 6px}
    .film-meta{padding:.6rem .7rem;display:flex;flex-direction:column;gap:.45rem;flex:1}
    .film-orig{font-size:.72rem;color:var(--ink-soft)}
    .price{font-weight:700;color:var(--sienna);font-size:1.15rem}
    .badges{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:auto}
    .tag{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border:1px solid var(--ink)}
    .tag-orig{background:var(--oxblood);color:var(--paper)}
    .tag-special{background:var(--ink);color:var(--paper)}
    .badge{border-radius:0!important;font-family:"Space Mono",monospace!important;font-weight:400!important}
    .filterbar{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;padding:.9rem 1rem;background:var(--paper-2);border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink)}
    .check{display:flex;align-items:center;gap:.4rem;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em}
    .check input{box-shadow:none!important;width:16px;height:16px}
    .hero{position:relative;border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink);background-color:var(--paper-3);background-image:var(--dither);background-size:3px 3px;padding:1.4rem 1.5rem;margin-bottom:1.3rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
    .hero h1{font-size:2.4rem;line-height:.95;margin:0}
    .hero .sub{color:var(--ink-soft);font-size:.85rem;margin-top:.3rem}
    .trend{display:inline-block;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;padding:.4rem .8rem;border:2px solid var(--ink);margin:.2rem 0 1rem;font-weight:700}
    .alert-warning,.trend.rising{background:var(--sienna)!important;color:var(--paper)!important}
    .alert-success,.trend.falling{background:var(--olive)!important;color:var(--paper)!important}
    .alert-secondary,.trend.stable{background:var(--paper-2)!important;color:var(--ink)!important}
    .alert{border:2px solid var(--ink)!important;border-radius:0!important}
    table.table{background:var(--paper-2)!important;border:2px solid var(--ink);box-shadow:5px 5px 0 var(--ink)}
    table.table thead th{background:var(--ink);color:var(--paper);text-transform:uppercase;font-size:.72rem;letter-spacing:.08em;border:none}
    table.table td{border-color:var(--paper-3);color:var(--ink);vertical-align:middle}
    .site-foot{border-top:3px solid var(--ink);background:var(--paper-2);padding:1rem 1.1rem;margin-top:2rem;font-size:.74rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em}
    @media(max-width:640px){.nav-search{margin-left:0;order:5}.nav-search input{width:100%}.hero h1{font-size:1.7rem}}
  </style>
</head>
<body>
<nav class="site-nav">
  <a class="brand" href="{% url 'catalog:movie_list' %}">Вот<span>чер</span></a>
  <div class="nav-links">
    <a href="{% url 'catalog:movie_list' %}">Афиша</a>
    <a href="{% url 'catalog:new_releases' %}">Новинки</a>
  </div>
  <form class="nav-search" method="get" action="{% url 'catalog:movie_list' %}" role="search">
    <input type="search" name="q" placeholder="Поиск фильма…" aria-label="Поиск фильма">
  </form>
  <div class="nav-auth">
    {% if user.is_authenticated %}
      <a href="{% url 'accounts:subscriptions' %}">Подписки</a>
      <span class="nav-user">{{ user.username }}</span>
      <form method="post" action="{% url 'logout' %}" style="display:inline">{% csrf_token %}
        <button class="neu-btn sm">Выйти</button></form>
    {% else %}
      <a href="{% url 'login' %}">Войти</a>
      <a class="neu-btn sm" href="{% url 'accounts:register' %}">Регистрация</a>
    {% endif %}
  </div>
</nav>
<main class="container">
  {% block content %}{% endblock %}
</main>
<footer class="site-foot">
  Учебный проект цифровой кафедры · мониторинг цен кинотеатров Москвы · данные: Афиша.ру, Москино
</footer>
</body>
</html>
