<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}КиноМонитор{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand bg-dark navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'catalog:movie_list' %}">КиноМонитор</a>
    <div class="navbar-nav ms-auto align-items-center">
      {% if user.is_authenticated %}
        <a class="nav-link" href="{% url 'accounts:subscriptions' %}">Мои подписки</a>
        <span class="navbar-text mx-3">{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" class="d-inline">{% csrf_token %}
          <button class="btn btn-outline-light btn-sm">Выйти</button>
        </form>
      {% else %}
        <a class="nav-link" href="{% url 'login' %}">Войти</a>
        <a class="nav-link" href="{% url 'accounts:register' %}">Регистрация</a>
      {% endif %}
    </div>
  </div>
</nav>
<main class="container">
  {% block content %}{% endblock %}
</main>
<footer class="container py-4 text-muted small">
  Учебный проект цифровой кафедры · мониторинг цен кинотеатров Москвы ·
  данные: Афиша.ру, Москино
</footer>
</body>
</html>
