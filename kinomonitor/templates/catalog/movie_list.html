{% extends "base.html" %}

{% block content %}
<h1 style="font-size:2.3rem;margin-bottom:1rem">Афиша</h1>

<form class="filterbar"
      hx-get="{% url 'catalog:movie_list' %}" hx-target="#movie-table" hx-trigger="change, submit"
      action="{% url 'catalog:movie_list' %}" method="get">
  <input type="search" name="q" value="{{ q }}" placeholder="Поиск фильма…" style="min-width:220px">
  <label class="check">
    <input type="checkbox" name="original" value="1" {% if only_original %}checked{% endif %}> только в оригинале
  </label>
  <label class="check">
    <input type="checkbox" name="special" value="1" {% if show_special %}checked{% endif %}> спецпоказы
  </label>
  <button class="neu-btn">Найти</button>
</form>

<div id="movie-table">
  {% include "catalog/_movie_table.html" %}
</div>
{% endblock %}
