{% extends "base.html" %}

{% block title %}Регистрация — КиноМонитор{% endblock %}

{% block content %}
<div class="col-md-4 mx-auto">
  <h1 class="h4 mb-3">Регистрация</h1>
  <form method="post" class="card card-body shadow-sm">
    {% csrf_token %}
    {{ form.as_div }}
    <button class="btn btn-primary mt-3">Создать аккаунт</button>
  </form>
  <p class="mt-3 text-muted">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
</div>
{% endblock %}
