{% extends "base.html" %}

{% block title %}Регистрация — Вотчер{% endblock %}

{% block content %}
<div style="max-width:430px;margin:1rem auto">
  <h1 style="font-size:2rem;margin-bottom:1rem">Регистрация</h1>
  <form method="post" class="card card-body">
    {% csrf_token %}
    {{ form.as_div }}
    <button class="neu-btn" style="margin-top:1rem">Создать аккаунт</button>
  </form>
  <p class="muted" style="margin-top:1rem">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
</div>
{% endblock %}
